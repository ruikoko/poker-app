# /etc/nginx/sites-available/pokerapp
#
# FASE 1 — acesso por IP, HTTP
# Para migrar para domínio + HTTPS:
#   1. Substituir server_name pelo domínio
#   2. Correr: sudo certbot --nginx -d exemplo.com
#   3. Mudar ENV=production no .env do backend
#   4. Mudar ALLOWED_ORIGIN=https://exemplo.com no .env
#   5. Recarregar: sudo systemctl reload nginx pokerapp

server {
    listen 80;

    # ── Alterar apenas esta linha para migrar para domínio ───────────────────
    server_name _;   # "_" aceita qualquer host/IP
    # server_name exemplo.com www.exemplo.com;   # ← descomentar quando houver domínio

    # Logs
    access_log /var/log/nginx/pokerapp_access.log;
    error_log  /var/log/nginx/pokerapp_error.log;

    # ── API → backend FastAPI ────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts generosos para imports grandes
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Uploads até 50MB (summaries em ZIP)
        client_max_body_size 50M;
    }

    # Healthcheck acessível sem /api/
    location /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # ── Frontend React (ficheiros estáticos) ─────────────────────────────────
    location / {
        root  /var/www/pokerapp/frontend/dist;
        index index.html;

        # SPA routing — todas as rotas desconhecidas → index.html
        try_files $uri $uri/ /index.html;

        # Cache de assets com hash no nome (gerados pelo Vite)
        location ~* \.(js|css|png|jpg|ico|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
